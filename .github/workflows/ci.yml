name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  tests-backend:
    name: Tests backend (Jest + MySQL)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=12

    defaults:
      run:
        working-directory: CESIZen/backend

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME_TEST: cesizen_test
      # Secret factice : uniquement pour les tests CI, jamais utilisé ailleurs
      JWT_SECRET: secret_de_test_ci_uniquement
      JWT_EXPIRES_IN: 1h

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: CESIZen/backend/package-lock.json

      - name: Installation des dépendances
        run: npm ci

      - name: Exécution des tests
        run: npm test

  build-frontend:
    name: Build frontend (Vite)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: CESIZen/frontend

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: CESIZen/frontend/package-lock.json

      - name: Installation des dépendances
        run: npm ci

      - name: Build de production
        run: npm run build